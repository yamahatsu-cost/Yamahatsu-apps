<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出張費精算</title>
</head>
<body>
<script>
(function(){
  const APP_VERSION = "2026.04.13.7";
  const TARGET = "./app-202604137.html";
  const key = "app_version";

  const old = localStorage.getItem(key);
  if (old && old !== APP_VERSION) {
    alert("新しいバージョンがあります。更新します。");
  }
  localStorage.setItem(key, APP_VERSION);

  location.replace(TARGET + "?v=" + APP_VERSION + "&t=" + Date.now());
})();
</script>
</body>
</html>
