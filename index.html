<script>
(function(){
  const APP_VERSION = "2026.04.13.6";
  const TARGET = "./app-202604136.html";
  const VERSION_KEY = "trip-expense-launcher-version";
  try {
    const old = localStorage.getItem(VERSION_KEY);
    if (old && old !== APP_VERSION) {
      alert("新しいバージョンがあります。最新版を開きます。");
    }
    localStorage.setItem(VERSION_KEY, APP_VERSION);
  } catch(e) {}
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister()))).catch(() => {}).finally(openLatest);
  } else {
    openLatest();
  }
  function openLatest(){
    location.replace(TARGET + "?v=" + encodeURIComponent(APP_VERSION) + "&t=" + Date.now());
  }
})();
</script>
